<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520">
  <defs>
    <pattern id="dotgrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#c8c5bb"/>
    </pattern>
    <style>
      .mono { font-family: 'IBM Plex Mono', 'JetBrains Mono', monospace; }
      .ink { fill: #121212; }
      .muted { fill: #6d6a63; }
      .accent { fill: #ea580c; }
      .card { fill: #fbfaf4; stroke: #111111; stroke-width: 1.6; }
      .card-dark { fill: #141414; stroke: #111111; stroke-width: 1.6; }
      .wire { stroke: #8f897e; stroke-width: 1.2; fill: none; }
      .wire-accent { stroke: #ea580c; stroke-width: 1.8; fill: none; }
    </style>
  </defs>

  <rect width="1200" height="520" fill="#f2f1ea"/>
  <rect width="1200" height="520" fill="url(#dotgrid)"/>

  <!-- Title -->
  <text x="24" y="28" class="mono muted" font-size="11" letter-spacing="2">ARCHITECTURE</text>
  <line x1="24" y1="38" x2="1176" y2="38" stroke="#1f1f1f" stroke-width="1"/>

  <!-- Layer 1: MCP Clients -->
  <text x="24" y="68" class="mono muted" font-size="10" letter-spacing="1.5">MCP CLIENTS</text>
  <rect x="24" y="78" width="120" height="40" class="card" rx="6"/>
  <text x="84" y="103" class="mono ink" font-size="11" text-anchor="middle">Claude</text>
  <rect x="160" y="78" width="120" height="40" class="card" rx="6"/>
  <text x="220" y="103" class="mono ink" font-size="11" text-anchor="middle">Cursor</text>
  <rect x="296" y="78" width="120" height="40" class="card" rx="6"/>
  <text x="356" y="103" class="mono ink" font-size="11" text-anchor="middle">Windsurf</text>
  <rect x="432" y="78" width="120" height="40" class="card" rx="6"/>
  <text x="492" y="103" class="mono ink" font-size="11" text-anchor="middle">Any MCP</text>

  <!-- Wires down -->
  <line x1="280" y1="118" x2="280" y2="148" class="wire-accent"/>

  <!-- Layer 2: MCP Server -->
  <rect x="24" y="148" width="530" height="65" class="card-dark" rx="8"/>
  <text x="44" y="173" class="mono accent" font-size="12" font-weight="700">agentic-workflow-mcp</text>
  <text x="44" y="193" class="mono" fill="#d8d4cb" font-size="10">Protocol Handler · Tool Registry (124 tools) · Transport (stdio/SSE)</text>

  <!-- Wire down -->
  <line x1="280" y1="213" x2="280" y2="243" class="wire-accent"/>

  <!-- Layer 3: Core Library (the big one) -->
  <rect x="24" y="243" width="1150" height="230" fill="#fbfaf4" stroke="#111111" stroke-width="2" rx="10"/>
  <text x="44" y="270" class="mono accent" font-size="13" font-weight="700" letter-spacing="1">agentic-workflow</text>
  <text x="230" y="270" class="mono muted" font-size="11">Core Library</text>

  <!-- Sub-modules as cards -->
  <!-- Engine -->
  <rect x="44" y="285" width="165" height="85" class="card" rx="6"/>
  <text x="54" y="305" class="mono accent" font-size="10" font-weight="700">ENGINE</text>
  <text x="54" y="322" class="mono ink" font-size="9">DAG · Scheduler</text>
  <text x="54" y="337" class="mono ink" font-size="9">Trigger · Batch</text>
  <text x="54" y="352" class="mono ink" font-size="9">Stream · FanOut · FSM</text>

  <!-- Resilience -->
  <rect x="225" y="285" width="165" height="85" class="card" rx="6"/>
  <text x="235" y="305" class="mono accent" font-size="10" font-weight="700">RESILIENCE</text>
  <text x="235" y="322" class="mono ink" font-size="9">Retry Intelligence</text>
  <text x="235" y="337" class="mono ink" font-size="9">Rollback · Circuit</text>
  <text x="235" y="352" class="mono ink" font-size="9">Dead Letter · Idempotency</text>

  <!-- Governance -->
  <rect x="406" y="285" width="165" height="85" class="card" rx="6"/>
  <text x="416" y="305" class="mono accent" font-size="10" font-weight="700">GOVERNANCE</text>
  <text x="416" y="322" class="mono ink" font-size="9">Approval Gates</text>
  <text x="416" y="337" class="mono ink" font-size="9">Audit Trail</text>
  <text x="416" y="352" class="mono ink" font-size="9">Variable Scoping</text>

  <!-- Template -->
  <rect x="587" y="285" width="165" height="85" class="card" rx="6"/>
  <text x="597" y="305" class="mono accent" font-size="10" font-weight="700">TEMPLATE</text>
  <text x="597" y="322" class="mono ink" font-size="9">Parameterized WF</text>
  <text x="597" y="337" class="mono ink" font-size="9">Natural Language</text>
  <text x="597" y="352" class="mono ink" font-size="9">Composition Algebra</text>

  <!-- Intelligence -->
  <rect x="768" y="285" width="165" height="85" class="card" rx="6"/>
  <text x="778" y="305" class="mono accent" font-size="10" font-weight="700">INTELLIGENCE</text>
  <text x="778" y="322" class="mono ink" font-size="9">Archaeology · Predict</text>
  <text x="778" y="337" class="mono ink" font-size="9">Evolution · Dream</text>
  <text x="778" y="352" class="mono ink" font-size="9">Collective</text>

  <!-- Format -->
  <rect x="949" y="285" width="210" height="85" class="card" rx="6"/>
  <text x="959" y="305" class="mono accent" font-size="10" font-weight="700">.awf FORMAT</text>
  <text x="959" y="322" class="mono ink" font-size="9">Binary · Memory-mappable</text>
  <text x="959" y="337" class="mono ink" font-size="9">BLAKE3 checksums</text>
  <text x="959" y="352" class="mono ink" font-size="9">LZ4 compression</text>

  <!-- Types layer -->
  <rect x="44" y="385" width="1115" height="35" fill="#f6ece4" stroke="#111111" stroke-width="1" rx="6"/>
  <text x="540" y="407" class="mono ink" font-size="11" text-anchor="middle">types/ — Workflow · Execution · Trigger · Schedule · Approval · Audit · Variable · Retry · Rollback · Batch · Stream · FSM · Template · Prediction</text>

  <!-- Side crates -->
  <!-- CLI -->
  <rect x="580" y="148" width="180" height="65" class="card" rx="8"/>
  <text x="600" y="173" class="mono ink" font-size="12" font-weight="700">agentic-workflow-cli</text>
  <text x="600" y="193" class="mono muted" font-size="10">awf binary · Clap CLI</text>

  <!-- FFI -->
  <rect x="780" y="148" width="180" height="65" class="card" rx="8"/>
  <text x="800" y="173" class="mono ink" font-size="12" font-weight="700">agentic-workflow-ffi</text>
  <text x="800" y="193" class="mono muted" font-size="10">C FFI · cdylib</text>

  <!-- Wires from CLI/FFI to core -->
  <line x1="670" y1="213" x2="670" y2="243" class="wire"/>
  <line x1="870" y1="213" x2="870" y2="243" class="wire"/>

  <!-- Bottom stats -->
  <text x="24" y="500" class="mono muted" font-size="10">4 crates · 76 files · 9,505 lines Rust · 250 tests · 0 failures</text>
  <text x="1176" y="500" class="mono accent" font-size="10" text-anchor="end" font-weight="700">v0.1.0</text>
</svg>
