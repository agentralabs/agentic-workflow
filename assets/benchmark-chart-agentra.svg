<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" role="img" aria-label="AgenticWorkflow benchmark chart in Agentra design system">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#c9c6bb"/>
    </pattern>
    <style><![CDATA[
      .mono { font-family:'IBM Plex Mono','JetBrains Mono',monospace; }
      .ink { fill:#121212; }
      .muted { fill:#6d6a63; }
      .accent { fill:#ea580c; }
      .frame { fill:#fffdf6; stroke:#1f1f1f; stroke-width:2; }
      .bar-fast { fill:#121212; }
      .bar-mid { fill:#4f4a43; }
      .bar-slow { fill:#ea580c; }
    ]]></style>
  </defs>

  <rect width="820" height="420" fill="#f2f1ea"/>
  <rect width="820" height="420" fill="url(#grid)"/>
  <line x1="18" y1="28" x2="802" y2="28" stroke="#1f1f1f"/>
  <text x="18" y="21" class="mono muted" font-size="11" letter-spacing="2">// BENCHMARK: ORCHESTRATION LATENCY PROFILE</text>

  <rect x="22" y="44" width="776" height="354" class="frame"/>
  <line x1="110" y1="86" x2="110" y2="340" stroke="#1f1f1f"/>
  <line x1="110" y1="340" x2="760" y2="340" stroke="#1f1f1f"/>

  <text x="72" y="96" class="mono muted" font-size="10" text-anchor="end">500ms</text>
  <text x="72" y="156" class="mono muted" font-size="10" text-anchor="end">200ms</text>
  <text x="72" y="216" class="mono muted" font-size="10" text-anchor="end">100ms</text>
  <text x="72" y="276" class="mono muted" font-size="10" text-anchor="end">50ms</text>
  <text x="72" y="336" class="mono muted" font-size="10" text-anchor="end">0ms</text>

  <!-- DAG 1K: <50ms -->
  <rect x="130" y="276" width="60" height="64" class="bar-fast"/>
  <!-- Batch 10K: <500ms -->
  <rect x="210" y="96" width="60" height="244" class="bar-slow"/>
  <!-- FSM 1K: <100ms -->
  <rect x="290" y="216" width="60" height="124" class="bar-mid"/>
  <!-- Audit 10K: <500ms -->
  <rect x="370" y="96" width="60" height="244" class="bar-slow"/>
  <!-- Idemp 10K: <200ms -->
  <rect x="450" y="156" width="60" height="184" class="bar-mid"/>
  <!-- .awf 100: <200ms -->
  <rect x="530" y="156" width="60" height="184" class="bar-mid"/>
  <!-- Anomaly 1K: <100ms -->
  <rect x="610" y="216" width="60" height="124" class="bar-mid"/>
  <!-- Exec 100: <100ms -->
  <rect x="690" y="216" width="60" height="124" class="bar-mid"/>

  <text x="160" y="360" class="mono ink" font-size="9" text-anchor="middle" letter-spacing="0.5">DAG</text>
  <text x="240" y="360" class="mono ink" font-size="9" text-anchor="middle" letter-spacing="0.5">BATCH</text>
  <text x="320" y="360" class="mono ink" font-size="9" text-anchor="middle" letter-spacing="0.5">FSM</text>
  <text x="400" y="360" class="mono ink" font-size="9" text-anchor="middle" letter-spacing="0.5">AUDIT</text>
  <text x="480" y="360" class="mono ink" font-size="9" text-anchor="middle" letter-spacing="0.5">IDEMP</text>
  <text x="560" y="360" class="mono ink" font-size="9" text-anchor="middle" letter-spacing="0.5">.AWF</text>
  <text x="640" y="360" class="mono ink" font-size="9" text-anchor="middle" letter-spacing="0.5">ANOMALY</text>
  <text x="720" y="360" class="mono ink" font-size="9" text-anchor="middle" letter-spacing="0.5">EXEC</text>

  <text x="44" y="377" class="mono muted" font-size="11" letter-spacing="1.5">FAST PATH: SUB-100MS DAG + FSM | HEAVY PATH: 10K-SCALE BATCH OPS</text>
  <line x1="44" y1="384" x2="776" y2="384" stroke="#1f1f1f"/>
  <text x="44" y="398" class="mono ink" font-size="12" letter-spacing="1.2">REFERENCE: STRESS TESTS ON APPLE ARM64, RUST RELEASE MODE</text>
  <circle cx="776" cy="394" r="4" class="accent"/>
</svg>
