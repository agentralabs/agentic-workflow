<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 360" role="img" aria-label="AgenticWorkflow hero pane in Agentra design system">
  <defs>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#c9c6bb"/>
    </pattern>
    <style><![CDATA[
      .ink { fill:#121212; }
      .muted { fill:#6d6a63; }
      .accent { fill:#ea580c; }
      .mono { font-family:'IBM Plex Mono','JetBrains Mono',monospace; }
      .sans { font-family:'Sora','Space Grotesk',sans-serif; }
    ]]></style>
  </defs>

  <rect width="1400" height="360" fill="#f2f1ea"/>
  <rect width="1400" height="360" fill="url(#grid)"/>

  <line x1="28" y1="34" x2="1372" y2="34" stroke="#1f1f1f" stroke-width="1"/>
  <text x="28" y="26" class="mono muted" font-size="13" letter-spacing="2">// SECTION: WORKFLOW.ORCHESTRATE</text>
  <text x="1338" y="26" class="mono muted" font-size="13" text-anchor="end" letter-spacing="2">TICK:0024</text>

  <rect x="28" y="60" width="430" height="274" fill="#fffdf6" stroke="#1f1f1f" stroke-width="2"/>
  <rect x="28" y="60" width="430" height="32" fill="#2a2825"/>
  <text x="44" y="81" class="mono" font-size="12" fill="#d5d1c7" letter-spacing="2">RENDER: WORKFLOW.DAG</text>
  <text x="442" y="81" class="mono accent" font-size="12" text-anchor="end" letter-spacing="2">LIVE</text>

  <rect x="44" y="108" width="398" height="194" fill="#0f0f10" stroke="#1f1f1f" stroke-width="1.5"/>

  <!-- DAG visualization: Build → Test → Approve → Deploy -->
  <circle cx="140" cy="160" r="6" fill="#ea580c"/>
  <text x="140" y="145" class="mono" fill="#6d6a63" font-size="10" text-anchor="middle">BUILD</text>
  <line x1="146" y1="160" x2="214" y2="160" stroke="#ea580c" stroke-width="1.5"/>

  <circle cx="220" cy="160" r="6" fill="#ea580c"/>
  <text x="220" y="145" class="mono" fill="#6d6a63" font-size="10" text-anchor="middle">TEST</text>
  <line x1="226" y1="160" x2="294" y2="160" stroke="#ea580c" stroke-width="1.5"/>

  <circle cx="300" cy="160" r="6" fill="#ea580c"/>
  <text x="300" y="145" class="mono" fill="#6d6a63" font-size="10" text-anchor="middle">APPROVE</text>
  <line x1="306" y1="160" x2="374" y2="160" stroke="#4f4a43" stroke-width="1.5" stroke-dasharray="4,3"/>

  <circle cx="380" cy="160" r="6" fill="#4f4a43"/>
  <text x="380" y="145" class="mono" fill="#4f4a43" font-size="10" text-anchor="middle">DEPLOY</text>

  <!-- Parallel branch -->
  <line x1="226" y1="166" x2="260" y2="220" stroke="#4f4a43" stroke-width="1"/>
  <circle cx="260" cy="226" r="5" fill="#4f4a43"/>
  <text x="260" y="248" class="mono" fill="#4f4a43" font-size="9" text-anchor="middle">NOTIFY</text>
  <line x1="266" y1="220" x2="374" y2="166" stroke="#4f4a43" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- FSM mini -->
  <rect x="120" y="262" width="70" height="22" rx="4" fill="#2a2825"/>
  <text x="155" y="277" class="mono" fill="#ea580c" font-size="9" text-anchor="middle">RUNNING</text>
  <rect x="210" y="262" width="70" height="22" rx="4" fill="#2a2825"/>
  <text x="245" y="277" class="mono" fill="#6d6a63" font-size="9" text-anchor="middle">PAUSED</text>
  <rect x="300" y="262" width="70" height="22" rx="4" fill="#2a2825"/>
  <text x="335" y="277" class="mono" fill="#6d6a63" font-size="9" text-anchor="middle">DONE</text>

  <text x="44" y="325" class="mono" font-size="11" fill="#5f5a52" letter-spacing="1.6">SIGNAL: DAG + FSM + BATCH + STREAM + FANOUT</text>

  <line x1="480" y1="60" x2="480" y2="334" stroke="#1f1f1f" stroke-width="2"/>
  <text x="520" y="132" class="sans ink" font-size="66" font-weight="700" letter-spacing="1">UNIVERSAL</text>
  <text x="520" y="195" class="sans accent" font-size="66" font-weight="700" letter-spacing="1">ORCHESTRATION</text>

  <text x="520" y="238" class="mono muted" font-size="22">Workflows, pipelines, state machines, and</text>
  <text x="520" y="268" class="mono muted" font-size="22">portable <tspan class="accent">.awf</tspan> orchestration artifacts.</text>

  <line x1="520" y1="292" x2="1308" y2="292" stroke="#1f1f1f" stroke-width="2"/>
  <text x="520" y="318" class="mono ink" font-size="12" letter-spacing="2">AGENTICWORKFLOW</text>
  <text x="860" y="318" class="mono ink" font-size="12" letter-spacing="2">RETRY + ROLLBACK + APPROVAL</text>
  <circle cx="1308" cy="314" r="5" fill="#ea580c"/>
</svg>
