<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 360" role="img" aria-label="AgenticWorkflow GitHub hero pane">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#b8b6ae"/>
    </pattern>
  </defs>
  <rect width="1400" height="360" fill="#f2f1ea"/>
  <rect width="1400" height="360" fill="url(#grid)"/>
  <rect x="20" y="20" width="1360" height="320" fill="none" stroke="#111111" stroke-width="2"/>

  <line x1="20" y1="62" x2="1380" y2="62" stroke="#111111" stroke-width="2"/>
  <text x="40" y="48" font-family="'JetBrains Mono', monospace" font-size="14" fill="#5f5c53" letter-spacing="2"> // AGENTRA_LABS: MODULE_HERO</text>
  <rect x="1318" y="36" width="8" height="8" fill="#ea580c"/>
  <text x="1336" y="48" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" letter-spacing="2">005</text>

  <!-- Orchestration diagram -->
  <rect x="46" y="92" width="232" height="232" fill="none" stroke="#111111" stroke-width="2"/>
  <rect x="46" y="92" width="232" height="38" fill="#111111"/>
  <text x="62" y="116" font-family="'JetBrains Mono', monospace" font-size="11" fill="#f2f1ea" letter-spacing="2">WORKFLOW.DAG_ENGINE</text>

  <!-- DAG nodes -->
  <rect x="76" y="156" width="60" height="28" fill="none" stroke="#111111" stroke-width="2" rx="2"/>
  <text x="84" y="174" font-family="'JetBrains Mono', monospace" font-size="9" fill="#111111">BUILD</text>

  <rect x="186" y="148" width="60" height="28" fill="none" stroke="#ea580c" stroke-width="2" rx="2"/>
  <text x="194" y="166" font-family="'JetBrains Mono', monospace" font-size="9" fill="#ea580c">TEST</text>

  <rect x="130" y="218" width="68" height="28" fill="none" stroke="#111111" stroke-width="2" rx="2"/>
  <text x="138" y="236" font-family="'JetBrains Mono', monospace" font-size="9" fill="#111111">APPROVE</text>

  <rect x="76" y="272" width="56" height="24" fill="none" stroke="#ea580c" stroke-width="2" rx="2"/>
  <text x="82" y="288" font-family="'JetBrains Mono', monospace" font-size="8" fill="#ea580c">DEPLOY</text>

  <rect x="190" y="272" width="56" height="24" fill="none" stroke="#111111" stroke-width="2" rx="2"/>
  <text x="196" y="288" font-family="'JetBrains Mono', monospace" font-size="8" fill="#111111">NOTIFY</text>

  <!-- Edges -->
  <line x1="136" y1="170" x2="186" y2="162" stroke="#111111" stroke-width="2"/>
  <line x1="216" y1="176" x2="164" y2="218" stroke="#ea580c" stroke-width="2"/>
  <line x1="106" y1="184" x2="148" y2="218" stroke="#111111" stroke-width="2"/>
  <line x1="164" y1="246" x2="104" y2="272" stroke="#111111" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="164" y1="246" x2="218" y2="272" stroke="#111111" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Title -->
  <text x="324" y="136" font-family="'JetBrains Mono', monospace" font-size="54" fill="#111111" font-weight="700" letter-spacing="1">AGENTICWORKFLOW</text>
  <text x="324" y="172" font-family="'JetBrains Mono', monospace" font-size="18" fill="#ea580c" font-weight="700" letter-spacing="2">UNIVERSAL ORCHESTRATION ENGINE</text>
  <text x="324" y="210" font-family="'JetBrains Mono', monospace" font-size="16" fill="#5f5c53">
    Orchestration is coordination intelligence, not config files. DAGs, state
  </text>
  <text x="324" y="234" font-family="'JetBrains Mono', monospace" font-size="16" fill="#5f5c53">
    machines, batch, retry, rollback, approval. One portable .awf binary file.
  </text>

  <!-- Stat boxes -->
  <rect x="324" y="258" width="154" height="34" fill="#111111"/>
  <text x="338" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#ea580c" font-weight="700">24 CAPABILITIES</text>
  <rect x="494" y="258" width="154" height="34" fill="#111111"/>
  <text x="508" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#ea580c" font-weight="700">124 MCP TOOLS</text>
  <rect x="664" y="258" width="154" height="34" fill="#111111"/>
  <text x="678" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f2f1ea" font-weight="700">.AWF FORMAT</text>
  <rect x="834" y="258" width="154" height="34" fill="#111111"/>
  <text x="848" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f2f1ea" font-weight="700">MIT LICENSE</text>

  <!-- Bottom status -->
  <text x="46" y="340" font-family="'JetBrains Mono', monospace" font-size="11" fill="#5f5c53" letter-spacing="1">STATUS: OPERATIONAL</text>
  <rect x="200" y="330" width="8" height="8" fill="#22c55e"/>
  <text x="220" y="340" font-family="'JetBrains Mono', monospace" font-size="11" fill="#5f5c53">ENGINES: 8/8</text>
  <rect x="350" y="330" width="8" height="8" fill="#22c55e"/>
  <text x="370" y="340" font-family="'JetBrains Mono', monospace" font-size="11" fill="#5f5c53">RESILIENCE: ARMED</text>
  <rect x="530" y="330" width="8" height="8" fill="#22c55e"/>
  <text x="550" y="340" font-family="'JetBrains Mono', monospace" font-size="11" fill="#5f5c53">GOVERNANCE: ACTIVE</text>
</svg>
